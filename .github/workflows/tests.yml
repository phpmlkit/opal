name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [ubuntu-latest, macos-latest, windows-latest]
        php: [8.2, 8.3, 8.4, 8.5]

    steps:
      - name: Checkout code
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: ${{ matrix.php }}
          extensions: ffi
          coverage: none

      - name: Install dependencies
        uses: ramsey/composer-install@v4

      - name: Debug libvips path (Windows)
        if: runner.os == 'Windows'
        shell: bash
        run: |
          echo "=== lib/ directory tree ==="
          find lib/ -type f 2>/dev/null || echo "(no lib directory)"
          echo ""
          echo "=== lib/windows-64/ directory tree ==="
          find lib/windows-64/ -type f 2>/dev/null || echo "(no lib/windows-64 directory)"
          echo ""
          echo "=== PHP info ==="
          php -r '
            $dll = "lib/windows-64/libvips-42.dll";
            echo "dll path: " . $dll . "\n";
            echo "realpath: " . (realpath($dll) ?: "false") . "\n";
            echo "file_exists: " . (file_exists($dll) ? "yes" : "no") . "\n";
            echo "PHP_INT_SIZE: " . PHP_INT_SIZE . " (".(PHP_INT_SIZE === 8 ? "64-bit" : "32-bit").")\n";
            echo "ffi loaded: " . (extension_loaded("ffi") ? "yes" : "no") . "\n";
            echo "ffi.enable: " . (ini_get("ffi.enable") ?: "(not set)") . "\n";
            echo "PHP_OS_FAMILY: " . PHP_OS_FAMILY . "\n";
            echo "PHP_VERSION: " . PHP_VERSION . "\n";
          '
          echo ""
          echo "=== Direct FFI load attempt ==="
          php -r '
            $dll = __DIR__ . "\\lib\\windows-64\\libvips-42.dll";
            $libDir = __DIR__ . "\\lib\\windows-64";
            echo "DLL: $dll\n";
            echo "Lib dir: $libDir\n";

            // 1. Plain direct load
            echo "\n--- 1. Plain direct load ---\n";
            try {
              $vips = \FFI::cdef("int vips_init (const char *argv0);", $dll);
              echo "OK\n";
            } catch (\Throwable $e) {
              echo get_class($e) . ": " . $e->getMessage() . "\n";
            }

            // 2. SetDllDirectoryA
            echo "\n--- 2. SetDllDirectoryA ---\n";
            try {
              $k32 = \FFI::cdef(
                "int SetDllDirectoryA(const char* lpPathName);",
                "kernel32.dll"
              );
              $k32->SetDllDirectoryA($libDir);
              $vips = \FFI::cdef("int vips_init (const char *argv0);", $dll);
              echo "OK\n";
              $k32->SetDllDirectoryA(null);
            } catch (\Throwable $e) {
              echo get_class($e) . ": " . $e->getMessage() . "\n";
            }

            // 3. AddDllDirectory (using mbstowcs from msvcrt.dll for proper wchar_t conversion)
            echo "\n--- 3. AddDllDirectory ---\n";
            try {
              $msvcrt = \FFI::cdef(
                'size_t mbstowcs(void *wcstr, const char *mbstr, size_t count);',
                'msvcrt.dll'
              );
              $k32 = \FFI::cdef(
                "int SetDefaultDllDirectories(unsigned long DirectoryFlags); void* AddDllDirectory(const void* NewDirectory); int RemoveDllDirectory(void* Cookie);",
                "kernel32.dll"
              );
              $k32->SetDefaultDllDirectories(0x1000); // LOAD_LIBRARY_SEARCH_DEFAULT_DIRS
              $pathLen = strlen($libDir);
              $wide = $msvcrt->new('char[' . ($pathLen * 2 + 2) . ']');
              $ret = (int) $msvcrt->mbstowcs($wide, $libDir, $pathLen + 1);
              if ($ret === 0 && $pathLen > 0) {
                throw new \Exception("mbstowcs conversion failed (returned 0)");
              }
              $cookie = $k32->AddDllDirectory($wide);
              $vips = \FFI::cdef("int vips_init (const char *argv0);", $dll);
              echo "OK\n";
              $k32->RemoveDllDirectory($cookie);
            } catch (\Throwable $e) {
              echo get_class($e) . ": " . $e->getMessage() . "\n";
            }

            // 4. putenv PATH (known working, for comparison)
            echo "\n--- 4. putenv PATH ---\n";
            try {
              $old = getenv("PATH");
              putenv("PATH=" . $libDir . ";" . $old);
              $vips = \FFI::cdef("int vips_init (const char *argv0);", $dll);
              echo "OK\n";
            } catch (\Throwable $e) {
              echo get_class($e) . ": " . $e->getMessage() . "\n";
            }
          ' 2>&1 || echo "FFI load command failed"

      - name: Run tests
        run: composer test:pretty

  cs-check:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.2'
          coverage: none

      - name: Install Composer
        uses: ramsey/composer-install@v4

      - name: Run CS check
        run: composer cs:check

  lint:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v6

      - name: Setup PHP
        uses: shivammathur/setup-php@v2
        with:
          php-version: '8.3'
          coverage: none

      - name: Install Composer
        uses: ramsey/composer-install@v4

      - name: Run PHPStan
        run: composer lint
