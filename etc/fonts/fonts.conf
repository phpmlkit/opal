<?xml version="1.0"?>
<!DOCTYPE fontconfig SYSTEM "urn:fontconfig:fonts.dtd">
<fontconfig>
	<description>Default fontconfig configuration bundled with opal on macOS.</description>

	<!--
		Default macOS font locations. The tilde (~) is expanded by fontconfig
		to the current user's home directory. This mirrors what Homebrew's
		fontconfig package provides on macOS.

		If you need a different set of font locations, set the FONTCONFIG_PATH
		environment variable before loading opal. The bootstrap will respect
		any pre-existing value and not overwrite it.
	-->

	<dir>/System/Library/Fonts</dir>
	<dir>/Library/Fonts</dir>
	<dir>~/Library/Fonts</dir>
	<dir prefix="xdg">fonts</dir>
</fontconfig>
